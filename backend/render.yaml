services:
  - type: web
    name: nexora-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.cjs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RENDER
        value: true
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
